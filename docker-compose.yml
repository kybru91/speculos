version: "3.7"

services:
  speculos:
    build: .
    image: ghcr.io/ledgerhq/speculos
    volumes:
      - ./apps:/speculos/apps
    ports:
      - "1234:1234" # gdb
      - "5000:5000" # api
      - "40000:40000" # apdu
      - "41000:41000" # vnc
    command: "./apps/boil.elf --seed secret --display headless --apdu-port 40000 --vnc-port 41000"
    # Add `--vnc-password "<password>"` for macos users to use built-in vnc client.
